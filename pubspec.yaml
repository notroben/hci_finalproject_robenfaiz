name: hci_finalproject_robenfaiz
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State Management & Local Storage
  flutter_bloc: ^8.1.3
  hydrated_bloc: ^9.1.3
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3

  # Firebase Integrations
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.1.0

  # Media, Audio & A11y
  flutter_tts: ^4.1.0
  audioplayers: ^6.0.0
  cached_network_image: ^3.3.1
  wakelock_plus: ^1.2.1
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0

  # Local System Alerts
  flutter_local_notifications: ^17.1.2
  intl: ^0.19.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

